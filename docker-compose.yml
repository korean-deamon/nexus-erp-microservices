version: '3.8'

services:
  # Database 1: Operations
  postgres-operations:
    image: postgres:15-alpine
    container_name: nexus-db-operations
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: operations_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_operations_data:/var/lib/postgresql/data

  # Database 2: Analytics
  postgres-analytics:
    image: postgres:15-alpine
    container_name: nexus-db-analytics
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data

  # Redis: For Caching, Session, and Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6380:6379"

  # Service A: Operations (Express.js)
  service-operations:
    build: ./services/service-a
    container_name: service-operations
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://admin:password@postgres-operations:5432/operations_db"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "your_jwt_secret_here"
      SERVICE_B_URL: "http://service-analytics:8000"
    depends_on:
      - postgres-operations
      - redis
    ports:
      - "3001:3001"
    volumes:
      - ./services/service-a:/app
      - /app/node_modules

  # Service B: Analytics (FastAPI)
  service-analytics:
    build: ./services/service-b
    container_name: service-analytics
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://admin:password@postgres-analytics:5432/analytics_db"
      REDIS_URL: "redis://redis:6379"
      PYTHONUNBUFFERED: 1
    depends_on:
      - postgres-analytics
      - redis
    ports:
      - "8000:8000"

  # Frontend: Next.js
  frontend:
    build: ./apps/frontend
    container_name: nexus-frontend
    restart: unless-stopped
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080/api"
      NEXT_PUBLIC_WS_URL: "ws://localhost:8080"
    ports:
      - "3000:3000"

  # Gateway: Nginx Reverse Proxy
  gateway:
    image: nginx:alpine
    container_name: nexus-gateway
    volumes:
      - ./infra/gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - service-operations
      - service-analytics
      - frontend

volumes:
  postgres_operations_data:
  postgres_analytics_data:
